services:
  redis:
    image: redis
    volumes:
      - redis_data:/data
    networks:
      - lkforum_net

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    networks:
      - lkforum_net

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    env_file: ./backend/.env
    environment:
      REDIS_ADDR: redis:6379
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      - redis
    networks:
      - lkforum_net

  frontend:
    build:
      context: ./frontend/user-web
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - lkforum_net
    restart: unless-stopped

  frontend-admin:
    build:
      context: ./frontend/admin-web
    ports:
      - "3004:80"
    depends_on:
      - backend
    networks:
      - lkforum_net
    restart: unless-stopped

networks:
  lkforum_net:

volumes:
  redis_data:
